<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blockbuster Video</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300..700;1,300..700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="styles.css">

    <script src="script.js" defer></script>
</head>

<body>

    <!------------------- Video ------------------->

    <main>
        <section class="video-section">

            <div id="loader">
                <img src="images/loader.gif" alt="loading">
            </div>

            <video id="main-video" autoplay muted playsinline>

                <source src="media/office-work.webm" type="video/webm">
                <source src="media/office-work.mp4" type="video/mp4">
                <p>Your browser doesn't support HTML video.
                    Here is a <a href="media/office-work.mp4">link to the video</a> instead.
                </p>
            </video>

            <!------------------- Text cards ------------------->

            <article class="text-card hidden" id="text-card-1">
                <p class="card-text">The days are long,</p>
            </article>

            <article class="text-card hidden" id="text-card-2">
                <p class="card-text">and the work never ends.</p>
            </article>

            <article class="text-card hidden" id="text-card-3">
                <p class="card-text">But still, you show up.</p>
            </article>

            <article class="text-card hidden" id="text-card-4">
                <p class="card-text">Quietly. Again and again.</p>
            </article>

            <article class="text-card hidden" id="text-card-5">
                <p class="card-text">That is enough.</p>
            </article>

            <article class="text-card hidden" id="text-card-6">
                <p class="card-text">Quote by: Gretchen Rubin</p>
            </article>

            <article class="text-card hidden" id="text-card-7">
                <p class="card-text">Click Here! <br> You showed up. You deserve a playlist.</p>
            </article>

            <!------------------- Images ------------------->

            <img id="img-card-5" src="images/again-1.svg" alt="the word again" class="hidden">
            <img id="img-card-6" src="images/again-2.svg" alt="the word again" class="hidden">
            <img id="img-card-7" src="images/again-3.svg" alt="the word again" class="hidden">
            <img id="img-card-8" src="images/again-4.svg" alt="the word again" class="hidden">
            <img id="img-card-9" src="images/again-5.svg" alt="the word again" class="hidden">
            <img id="img-card-10" src="images/again-6.svg" alt="the word again" class="hidden">
            <img id="img-card-11" src="images/again-7.svg" alt="the word again" class="hidden">
        </section>
    </main>

    <!------------------- Footer ------------------->
    <footer>
        <p class="credit-name">Nattaly Vargas Sanchez - DES 157B - Spring 2026</p>
    </footer>

</body>

</html>
